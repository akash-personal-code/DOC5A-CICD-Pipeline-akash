services:
  novapay-lite:
    build: .
    image: novapay-lite:${IMAGE_TAG:-local}
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: novapay
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env or shell before running docker compose}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SIMULATE_FAILURE: "false"
      SIMULATE_LATENCY_MS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/health | grep OK"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env or shell before running docker compose}
      POSTGRES_DB: novapay_lite
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapay -d novapay_lite"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
