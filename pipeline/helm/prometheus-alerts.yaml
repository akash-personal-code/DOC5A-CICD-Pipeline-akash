groups:
  - name: novapay-lite.rules
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of requests have failed in the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 Latency"
          description: "p99 latency is greater than 1 second for 5 minutes."

      - alert: ReadinessProbeFailing
        expr: kube_pod_status_ready{condition="false", pod=~"novapay-lite.*"} > 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Pod Readiness Failing"
          description: "Pod readiness probe is failing."

      - alert: PaymentSuccessRateDrop
        expr: sum(rate(payment_count_total{status="success"}[5m])) / sum(rate(payment_count_total[5m])) < 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Payment success rate dropping"
          description: "Payment success rate is below 95%."
