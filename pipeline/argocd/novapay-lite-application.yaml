apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: novapay-lite
  namespace: argocd
spec:
  project: default
  source:
    # Replace with your actual GitHub repository URL before deploying with ArgoCD.
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/novapay-lite.git
    targetRevision: main
    path: pipeline/helm/novapay-lite
  destination:
    server: https://kubernetes.default.svc
    namespace: novapay-staging
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
